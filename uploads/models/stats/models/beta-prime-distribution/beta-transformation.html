<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Beta prime distribution from a transformation of Beta rv</title>
    <link rel="stylesheet" type="text/css" href="../../../shared-libs/normalize.css">
    <link rel="stylesheet" type="text/css" href="../../../shared-libs/universal-style.css">
    <script src="../../../shared-libs/plotly-131.min.js"></script>
    <script src="../../../shared-libs/plotlyPlot.js"></script>
    <script src="../../../shared-libs/jstat-192.min.js"></script>
</head>
<body>
<div id="wrapper">
    <div id="figureWrapper">
        <div class="label halfSize">x ~ Beta</div>
        <div class="label halfSize">y = x/(1-x) ~ BetaPrime</div>
        <div id="xpdfPlot" class="halfSize"></div>
        <div id="ypdfPlot" class="halfSize"></div>
    </div><!-- #figureWrapper -->
    <div id="controlWrapper">
        <span class="controlBlock">
            <label for="alpha">&alpha; = </label>
            <input id="alpha" type="number" min="0.1" max="5" step="0.1" value="3">
        </span>
        <span class="controlBlock">
            <label for="beta">&beta; = </label>
            <input id="beta" type="number" min="0.1" max="5" step="0.1" value="2">
        </span>
        <br>
        <span class="controlBlock"><button name="generate" id="generate">Generate</button></span>
    </div><!-- #controlWrapper -->
</div><!-- #wrapper -->
<script src="./beta-transformation.js"></script>
</body>
</html>
