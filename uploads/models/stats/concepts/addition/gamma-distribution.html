<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Addition of Gamma-distributed rvs</title>
    <link rel="stylesheet" type="text/css" href="../../../shared-libs/normalize.css">
    <link rel="stylesheet" type="text/css" href="../../../shared-libs/universal-style.css">
    <script src="../../../shared-libs/plotly-131.min.js"></script>
    <script src="../../../shared-libs/plotlyPlot.js"></script>
    <script src="../../../shared-libs/jstat-192.min.js"></script>
    <style>
        .rowLabel{font-weight:bold}
        #simRow{color:#c11}
        #theoryRow{color:#222}
    </style>
</head>
<body>
<div id="wrapper">
    <div id="figureWrapper">
        <div id="mainPlot" class="fullSize"></div>
    </div><!-- #figureWrapper -->
    <div id="controlWrapper">
        <span id="simRow" class="controlBlock rowLabel">Simulation:</span>
        <span class="controlBlock">
            <label for="alpha">&alpha; = </label>
            <input id="alpha" type="number" min="0.5" max="5" step="0.1" value="2">
        </span>
        <span class="controlBlock">
            <label for="theta">&theta; = </label>
            <input id="theta" type="number" min="0.1" max="3" step="0.1" value="1">
        </span>
        <span class="controlBlock">
            <label for="n_sum">N = </label>
            <input id="n_sum" type="number" min="1" max="16" step="1" value="6">
        </span>
        <br>
        <span id="theoryRow" class="controlBlock rowLabel">Theory:</span>
        <span class="controlBlock">
            <label for="theory_alpha">&alpha; = </label>
            <input id="theory_alpha" type="number" min="0.01" step="0.01" value="2">
        </span>
        <span class="controlBlock">
            <label for="theory_theta">&theta; = </label>
            <input id="theory_theta" type="number" min="0.01" step="0.01" value="1">
        </span>
        <br>
        <span class="controlBlock">
            <button name="generate" id="generate">Generate</button>
        </span>
        <span class="controlBlock">
            <button name="stop" id="stop">Stop</button>
        </span>
    </div><!-- #controlWrapper -->
</div><!-- #wrapper -->
<script src="./gamma-distribution.js"></script>
</body>
</html>
